<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Recorder Control</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .panel {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 40px;
    width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 24px;
    text-align: center;
    color: #fff;
  }
  .source-group {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .source-btn {
    flex: 1;
    padding: 10px 8px;
    border: 2px solid #333;
    border-radius: 8px;
    background: transparent;
    color: #aaa;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .source-btn.active {
    border-color: #4ecdc4;
    color: #4ecdc4;
    background: rgba(78, 205, 196, 0.1);
  }
  .source-btn:hover { border-color: #666; }

  .record-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  .record-btn.start {
    background: #e74c3c;
    color: #fff;
  }
  .record-btn.start:hover { background: #c0392b; }
  .record-btn.stop {
    background: #555;
    color: #fff;
    animation: pulse 1.5s infinite;
  }
  .record-btn.stop:hover { background: #666; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
  }

  .status {
    text-align: center;
    font-size: 14px;
    color: #888;
    min-height: 20px;
    margin-bottom: 12px;
  }
  .status.recording { color: #e74c3c; }
  .status.done { color: #4ecdc4; }
  .status.error { color: #f39c12; }

  .elapsed {
    text-align: center;
    font-size: 32px;
    font-weight: 300;
    font-family: 'Courier New', monospace;
    color: #fff;
    margin-bottom: 20px;
    min-height: 40px;
  }

  .result {
    background: #111;
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: #888;
    word-break: break-all;
    display: none;
  }
  .result.show { display: block; }

  .health-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .health-dot.ok { background: #4ecdc4; }
  .health-dot.fail { background: #e74c3c; }

  .footer {
    margin-top: 16px;
    text-align: center;
    font-size: 11px;
    color: #555;
  }
</style>
</head>
<body>

<div class="panel">
  <h1>🎙 Audio Recorder</h1>

  <!-- 서버 상태 -->
  <div class="status" id="serverStatus">서버 연결 확인 중...</div>

  <!-- 소스 선택 -->
  <div class="source-group">
    <button class="source-btn active" data-source="mic" onclick="selectSource('mic')">🎤 마이크</button>
    <button class="source-btn" data-source="system" onclick="selectSource('system')">🔊 시스템</button>
    <button class="source-btn" data-source="both" onclick="selectSource('both')">🎤+🔊 동시</button>
  </div>

  <!-- 경과 시간 -->
  <div class="elapsed" id="elapsed"></div>

  <!-- 녹음 버튼 -->
  <button class="record-btn start" id="recordBtn" onclick="toggleRecord()">● 녹음 시작</button>

  <!-- 상태 메시지 -->
  <div class="status" id="recStatus"></div>

  <!-- 결과 -->
  <div class="result" id="result"></div>

  <div class="footer">http://localhost:8090</div>
</div>

<script>
const API = 'http://localhost:8090';
let selectedSource = 'mic';
let isRecording = false;
let timerInterval = null;
let startTime = null;

// ── 소스 선택 ──
function selectSource(source) {
  selectedSource = source;
  document.querySelectorAll('.source-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.source === source);
  });
}

// ── 녹음 토글 ──
async function toggleRecord() {
  if (!isRecording) {
    await startRecording();
  } else {
    await stopRecording();
  }
}

async function startRecording() {
  const btn = document.getElementById('recordBtn');
  const status = document.getElementById('recStatus');
  const result = document.getElementById('result');

  try {
    const res = await fetch(`${API}/record/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: selectedSource }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '녹음 시작 실패');
    }

    isRecording = true;
    btn.textContent = '■ 녹음 중지';
    btn.className = 'record-btn stop';
    status.textContent = `녹음 중 (${selectedSource})`;
    status.className = 'status recording';
    result.className = 'result';

    // 타이머 시작
    startTime = Date.now();
    timerInterval = setInterval(updateElapsed, 100);

  } catch (e) {
    status.textContent = e.message;
    status.className = 'status error';
  }
}

async function stopRecording() {
  const btn = document.getElementById('recordBtn');
  const status = document.getElementById('recStatus');
  const result = document.getElementById('result');

  clearInterval(timerInterval);

  try {
    const res = await fetch(`${API}/record/stop`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '녹음 중지 실패');
    }

    const data = await res.json();
    isRecording = false;
    btn.textContent = '● 녹음 시작';
    btn.className = 'record-btn start';
    status.textContent = `저장 완료 (${data.duration}초, ${data.size_kb} KB)`;
    status.className = 'status done';
    result.textContent = data.file;
    result.className = 'result show';

  } catch (e) {
    status.textContent = e.message;
    status.className = 'status error';
    isRecording = false;
    btn.textContent = '● 녹음 시작';
    btn.className = 'record-btn start';
  }
}

function updateElapsed() {
  const sec = (Date.now() - startTime) / 1000;
  const mm = String(Math.floor(sec / 60)).padStart(2, '0');
  const ss = String(Math.floor(sec % 60)).padStart(2, '0');
  const ms = String(Math.floor((sec * 10) % 10));
  document.getElementById('elapsed').textContent = `${mm}:${ss}.${ms}`;
}

// ── 서버 상태 확인 ──
async function checkHealth() {
  const el = document.getElementById('serverStatus');
  try {
    const res = await fetch(`${API}/health`);
    const data = await res.json();
    const mic = data.mic ? '마이크 ✓' : '마이크 ✗';
    const loop = data.loopback ? '루프백 ✓' : '루프백 ✗';
    el.innerHTML = `<span class="health-dot ok"></span>서버 연결됨 | ${mic} | ${loop}`;
  } catch {
    el.innerHTML = `<span class="health-dot fail"></span>서버에 연결할 수 없습니다`;
  }
}

checkHealth();
setInterval(checkHealth, 5000);
</script>
</body>
</html>
